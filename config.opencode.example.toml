# Copy to runner.opencode.toml and authenticate/configure OpenCode as needed.
# For OpenRouter models through OpenCode, set OPENROUTER_API_KEY in the environment.

benchmark_repo_url = "https://github.com/adum/coilbench.git"
benchmark_ref = "main"
download_full_levels = true

workspace_mode = "worktree"
worktree_root = ".puzzle-runs/worktrees"
log_root = ".puzzle-runs/logs"
status_dir = ".puzzle-runs/current"
results_path = "final_results.md"

solver_wrapper = "run_solver"
evaluation_script = "evaluate_full.py"
evaluation_timeout_seconds = 600
evaluation_process_timeout_seconds = 0

full_eval_password_env = "COIL_FULL_PASSWORD"
generate_full_eval_password = true

stale_limit = 3
max_rounds = 20

# Wall-clock cap for a single OpenCode call.
agent_timeout_seconds = 86400

# OpenCode emits JSON events while active, so this catches truly quiet/stuck calls.
# Set to 0 to disable.
agent_idle_timeout_seconds = 1800

# Retry window for non-timeout agent process failures. Retries use exponential
# backoff starting at 5s and doubling each time. Set to 0 to disable.
agent_failure_retry_limit_seconds = 900

build_checker = true
# OpenCode writes raw JSON events to the agent stdout log. Keep runner terminal
# output quiet and use `puzzle-runner watch` for a readable live view.
echo_agent_output = false
echo_evaluation_output = true

forbidden_paths = [
  "levels_public/**",
  "levels_secret_even.tar.enc",
  "evaluate.py",
  "evaluate_full.py",
  "coil_check/check.c",
  "coil_check/Makefile",
  "coil_check/check",
]

[agent]
# Optional override. If omitted, Puzzle Runner derives this from agent.model or
# the --model/-m value in command.
# name = "custom-agent-name"
backend = "opencode"
prompt_mode = "stdin"
model = "openrouter/google/gemini-3-flash-preview"
# Passed to OpenCode as --variant. Use provider-supported values such as low,
# medium, high, max, or minimal.
effort = "high"
command = [
  "{config_dir}/scripts/opencode",
  "run",
  "--title",
  "{run_id}",
  "--format",
  "json",
  "--dangerously-skip-permissions",
]

# Copy to runner.toml and set OPENROUTER_API_KEY in the environment.

benchmark_repo_url = "https://github.com/adum/coilbench.git"
benchmark_ref = "main"
download_full_levels = true

workspace_mode = "worktree"
worktree_root = ".puzzle-runs/worktrees"
log_root = ".puzzle-runs/logs"
status_dir = ".puzzle-runs/current"
results_path = "final_results.md"

solver_wrapper = "run_solver"
evaluation_script = "evaluate_full.py"
evaluation_timeout_seconds = 600
evaluation_process_timeout_seconds = 0

full_eval_password_env = "COIL_FULL_PASSWORD"
generate_full_eval_password = true

stale_limit = 3
max_rounds = 20

agent_timeout_seconds = 86400
agent_idle_timeout_seconds = 0
agent_failure_retry_limit_seconds = 900

build_checker = true
echo_agent_output = true
echo_evaluation_output = true

forbidden_paths = [
  "levels_public/**",
  "levels_secret_even.tar.enc",
  "evaluate.py",
  "evaluate_full.py",
  "coil_check/check.c",
  "coil_check/Makefile",
  "coil_check/check",
]

[agent]
# Optional override. If omitted, Puzzle Runner derives this from agent.model or
# the --model/-m value in command.
# name = "custom-agent-name"
backend = "openrouter"
model = "poolside/laguna-xs.2:free"
# Optional. Sent as OpenRouter reasoning.effort. If omitted, Gemini 3 models default to high.
# effort = "high"
api_key_env = "OPENROUTER_API_KEY"
api_base_url = "https://openrouter.ai/api/v1"
# Puzzle Runner uses chat response ids to fetch /generation metadata for cost,
# provider, latency, and native token accounting when OpenRouter makes it available.
# OpenRouter calls use native tool calls for shell/read_file/write_file.
max_tokens = 16384
# Maximum model/tool-call loop steps in one agent turn. If this is reached,
# Puzzle Runner stops before evaluating an arbitrary intermediate workspace.
max_steps = 200
command_timeout_seconds = 120
